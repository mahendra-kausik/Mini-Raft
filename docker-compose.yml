services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      RAFT_PEERS: "http://replica1:3001,http://replica2:3002,http://replica3:3003"
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3
    restart: unless-stopped

  replica1:
    build: ./replica
    ports:
      - "3001:3001"
    environment:
      REPLICA_ID: "replica1"
      PORT: "3001"
      PEERS: "http://replica2:3002,http://replica3:3003"
    networks:
      - raft-net
    restart: unless-stopped

  replica2:
    build: ./replica
    ports:
      - "3002:3002"
    environment:
      REPLICA_ID: "replica2"
      PORT: "3002"
      PEERS: "http://replica1:3001,http://replica3:3003"
    networks:
      - raft-net
    restart: unless-stopped

  replica3:
    build: ./replica
    ports:
      - "3003:3003"
    environment:
      REPLICA_ID: "replica3"
      PORT: "3003"
      PEERS: "http://replica1:3001,http://replica2:3002"
    networks:
      - raft-net
    restart: unless-stopped

networks:
  raft-net:
    driver: bridge
